services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d salamandra"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crm-net

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"   # solo accesible desde el propio VPS (nginx nativo hace de proxy)
    networks:
      - crm-net

volumes:
  pgdata:

networks:
  crm-net:
    driver: bridge
