services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production          # postgres lee POSTGRES_USER/PASSWORD/DB directamente
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d salamandra"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crm-net

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm-net
    expose:
      - "3000"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - crm-net

volumes:
  pgdata:

networks:
  crm-net:
    driver: bridge
