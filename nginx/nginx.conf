worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Límite de cuerpo para uploads
    client_max_body_size 10M;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream: Next.js ───────────────────────────────────────────────────
    upstream nextjs {
        server app:3000;
    }

    # ── HTTP → HTTPS redirect (activar cuando tengas dominio + certificado) ─
    # server {
    #     listen 80;
    #     server_name crm.tudominio.com *.crm.tudominio.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── Servidor HTTP (sin SSL — para empezar o si usas solo IP) ───────────
    server {
        listen 80;
        server_name _;   # acepta cualquier host / IP directa

        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── HTTPS con certificado (descomentar cuando tengas cert) ─────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name crm.tudominio.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass         http://nextjs;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade $http_upgrade;
    #         proxy_set_header   Connection 'upgrade';
    #         proxy_set_header   Host $host;
    #         proxy_set_header   X-Real-IP $remote_addr;
    #         proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto https;
    #         proxy_cache_bypass $http_upgrade;
    #     }
    # }
}
